services:
  backend:
    image: ghcr.io/leeson1/blog-backend:latest
    restart: always
    environment:
      - DB_HOST=postgres
      - DB_NAME=blog
      - DB_USER=blog
      - DB_PASS=blogpassword
    volumes:
      - blog-images:/app/images
    networks:
      - blog-net
      - pg-network

  frontend:
    image: ghcr.io/leeson1/blog-frontend:latest
    restart: always
    ports:
      - "127.0.0.1:13000:80"
    depends_on:
      - backend
    networks:
      - blog-net

volumes:
  blog-images:

networks:
  blog-net:
    driver: bridge
  pg-network:
    external: true
